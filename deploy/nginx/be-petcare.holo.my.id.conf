# Citra PetCare API — nginx reverse proxy
# DNS: be-petcare.holo.my.id → this VPS, proxied through Cloudflare (orange
# cloud). TLS below is a Let's Encrypt origin cert (use Cloudflare SSL mode
# "Full (strict)").
#
# Install:
#   sudo cp be-petcare.holo.my.id.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/be-petcare.holo.my.id.conf /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d be-petcare.holo.my.id
#   sudo nginx -t && sudo systemctl reload nginx

# Restore the real client IP from Cloudflare so the API's per-IP rate limiter
# keys on the visitor, not on Cloudflare's edge. Keep this list in sync with
# https://www.cloudflare.com/ips/ (or use a cron'd include).
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    listen [::]:80;
    server_name be-petcare.holo.my.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name be-petcare.holo.my.id;

    # managed by certbot
    ssl_certificate     /etc/letsencrypt/live/be-petcare.holo.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/be-petcare.holo.my.id/privkey.pem;

    # x-ray/photo uploads go straight to object storage via presigned URLs,
    # but the local dev driver may proxy files through the API
    client_max_body_size 60m;

    # never expose Prometheus metrics publicly
    location = /metrics {
        deny all;
    }

    location = /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:8080;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # The API's per-IP rate limiter keys on CF-Connecting-IP. That header
        # is client-supplied, so overwrite it with the address validated above
        # ($remote_addr, restored from Cloudflare only for real Cloudflare
        # source IPs via set_real_ip_from). A caller that reaches this origin
        # directly (bypassing Cloudflare) then cannot forge it to rotate
        # rate-limit buckets and slip past the limiter / auth brute-force guard.
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_read_timeout 65s;
        proxy_send_timeout 65s;
    }
}
