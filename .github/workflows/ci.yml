name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # builds use the committed .sqlx cache — no database needed to compile
  SQLX_OFFLINE: "true"

jobs:
  check:
    name: fmt + clippy + sqlx cache + tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: petcare
          POSTGRES_PASSWORD: petcare
          POSTGRES_DB: petcare
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U petcare"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --check

      - name: clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: install sqlx-cli
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - name: verify .sqlx offline cache is in sync
        env:
          DATABASE_URL: postgres://petcare:petcare@localhost:5432/petcare
          SQLX_OFFLINE: "false"
        run: |
          sqlx migrate run
          cargo sqlx prepare --check

      - name: tests (integration tests use testcontainers → runner's Docker)
        run: cargo test

  deny:
    name: licenses & advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  docker:
    name: docker image builds (offline sqlx)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: citra-petcare:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
