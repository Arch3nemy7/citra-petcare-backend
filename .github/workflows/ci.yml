name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # builds use the committed .sqlx cache — no database needed to compile
  SQLX_OFFLINE: "true"

jobs:
  check:
    name: fmt + clippy + sqlx cache + tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: petcare
          POSTGRES_PASSWORD: petcare
          POSTGRES_DB: petcare
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U petcare"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --check

      - name: clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: install sqlx-cli
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - name: verify .sqlx offline cache is in sync
        env:
          DATABASE_URL: postgres://petcare:petcare@localhost:5432/petcare
          SQLX_OFFLINE: "false"
        run: |
          sqlx migrate run
          cargo sqlx prepare --check

      - name: tests (integration tests use testcontainers → runner's Docker)
        run: cargo test

  deny:
    name: licenses & advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  docker:
    name: docker image builds (offline sqlx)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: citra-petcare:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- CD: runs on the self-hosted runner on the production VPS ----
  # Builds the image natively (arm64, reusing the host's docker layer cache),
  # keeps a rollback history in GHCR, then restarts the compose stack.
  # The server's .env is never touched by CI.
  deploy:
    name: deploy to VPS
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check, deny, docker]
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 60
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/arch3nemy7/citra-petcare-backend
      DEPLOY_PATH: /home/Documents/citra-petcare

    steps:
      - uses: actions/checkout@v4

      # fail fast: the live checkout must fast-forward cleanly (uncommitted
      # local edits to tracked files on the server block the deploy)
      - name: sync live checkout
        run: |
          git -C "$DEPLOY_PATH" fetch origin
          git -C "$DEPLOY_PATH" merge --ff-only origin/main

      - name: log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: build image (native arm64)
        run: docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .

      - name: push to GHCR
        run: |
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: fix storage volume ownership
        run: |
          # the api runs as distroless nonroot (uid 65532); volumes created
          # before the image shipped /data/storage have a root-owned
          # mountpoint the app cannot write to (photo uploads failed)
          docker volume create citra-petcare_storage-data
          docker run --rm -v citra-petcare_storage-data:/data alpine:3 chown -R 65532:65532 /data

      - name: restart compose stack
        run: |
          # compose keeps using the citra-petcare:latest tag, so manual
          # `docker compose up -d --build` on the server still works
          docker tag "$IMAGE:${{ github.sha }}" citra-petcare:latest
          docker compose -f "$DEPLOY_PATH/docker-compose.yml" --project-directory "$DEPLOY_PATH" up -d --no-build --wait

      - name: smoke test
        run: |
          if ! curl -fsS --retry 12 --retry-delay 5 --retry-all-errors http://127.0.0.1:8080/readyz; then
            echo "readyz failed; recent api logs:"
            docker compose -f "$DEPLOY_PATH/docker-compose.yml" --project-directory "$DEPLOY_PATH" logs api --tail 50
            exit 1
          fi
          curl -fsS https://be-petcare.holo.my.id/healthz

      - name: prune dangling images
        run: docker image prune -f
