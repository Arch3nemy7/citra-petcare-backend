# cargo-deny configuration — license and vulnerability policy.
# Run with: cargo deny check

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "aarch64-unknown-linux-musl" },
]

[advisories]
version = 2
yanked = "deny"
ignore = [
    # Both are compile-time proc-macro helpers with no runtime exposure,
    # pulled transitively (utoipa-axum → paste, validator_derive →
    # proc-macro-error2). Drop these ignores once upstream migrates.
    "RUSTSEC-2024-0436", # paste — unmaintained
    "RUSTSEC-2026-0173", # proc-macro-error2 — unmaintained
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "OpenSSL",
    "MPL-2.0",
]
# ring bundles code under multiple permissive licenses; the OpenSSL entry above
# plus this clarification cover it.
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "allow" # large async ecosystems inevitably dup minor deps
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
